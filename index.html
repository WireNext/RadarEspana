<!DOCTYPE html>
<html>
<head>
    <title>Radar Pro - Compact Edition</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
        #map { width: 100%; height: 100vh; z-index: 1; }

        /* Estilo Liquid Glass Base */
        .glass-panel {
            position: absolute; z-index: 1000;
            background: rgba(25, 25, 25, 0.5); 
            backdrop-filter: blur(15px) saturate(160%);
            -webkit-backdrop-filter: blur(15px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        /* LEYENDA COMPACTA */
        .legend-panel {
            top: 15px; left: 15px; 
            padding: 10px 12px; border-radius: 16px;
            width: 105px;
        }
        
        .legend-title {
            font-size: 9px; font-weight: 800; opacity: 0.5;
            margin-bottom: 6px; letter-spacing: 0.8px; text-transform: uppercase;
        }

        .legend-item { 
            display: flex; align-items: center; 
            margin-bottom: 4px; font-size: 11px; font-weight: 500;
        }
        
        .color-box { 
            width: 10px; height: 10px; border-radius: 3px; 
            margin-right: 8px; border: 1px solid rgba(255,255,255,0.05);
        }

        /* Botón Ubicación Reducido */
        .locate-btn {
            position: absolute; top: 15px; right: 15px;
            width: 38px; height: 38px; z-index: 1000;
            background: rgba(25, 25, 25, 0.5); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: background 0.3s;
        }
        .locate-btn:active { background: rgba(50, 50, 50, 0.8); }

        /* Control Inferior Compacto */
        .timeline-container {
            bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 80%; max-width: 350px; padding: 12px 20px; border-radius: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        #time-label { font-weight: 700; font-size: 12px; margin-bottom: 8px; letter-spacing: 0.3px; }
        .slider-container { width: 100%; display: flex; align-items: center; }

        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 3px; background: rgba(255,255,255,0.15); border-radius: 2px; }
        input[type=range]::-webkit-slider-thumb { 
            -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%; 
            background: #fff; margin-top: -8px; box-shadow: 0 2px 6px #000; 
        }

        /* AJUSTES MÓVIL */
        @media (max-width: 600px) {
            .legend-panel {
                width: auto; top: auto; bottom: 100px; left: 50%; 
                transform: translateX(-50%); display: flex; flex-wrap: wrap;
                justify-content: center; gap: 8px; padding: 8px 15px;
                max-width: 85%;
            }
            .legend-title { display: none; }
            .legend-item { margin-bottom: 0; font-size: 10px; }
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="glass-panel legend-panel">
        <div class="legend-title">Radar</div>
        <div class="legend-item"><div class="color-box" style="background:#00e5ff"></div> Lleugera</div>
        <div class="legend-item"><div class="color-box" style="background:#00ff00"></div> Moderada</div>
        <div class="legend-item"><div class="color-box" style="background:#ffff00"></div> Forta</div>
        <div class="legend-item"><div class="color-box" style="background:#ff9100"></div> Molt Forta</div>
        <div class="legend-item"><div class="color-box" style="background:#ff0000"></div> Tempesta</div>
    </div>

    <div class="locate-btn" onclick="locateUser()">
        <svg viewBox="0 0 24 24" style="fill:white; width:18px;"><path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3c-.46-4.17-3.77-7.48-7.94-7.94V1h-2v2.06C6.83 3.52 3.52 6.83 3.06 11H1v2h2.06c.46 4.17 3.77 7.48 7.94 7.94V23h2v-2.06c4.17-.46 7.48-3.77 7.94-7.94H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/></svg>
    </div>

    <div class="glass-panel timeline-container">
        <div id="time-label">CONNECTANT...</div>
        <div class="slider-container">
            <input type="range" id="radar-slider" min="0" max="12" step="1" value="12">
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', { zoomControl: false, minZoom: 3, maxZoom: 12 }).setView([40, -3.7], 6);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        let timestamps = [];
        let host = "";
        let userMarker = null;
        let radarLayer = L.tileLayer('', { 
            opacity: 0.75, zIndex: 1000, maxNativeZoom: 8, maxZoom: 12, tileSize: 512, zoomOffset: -1 
        }).addTo(map);

        async function initRadar() {
            try {
                const response = await fetch('https://api.rainviewer.com/public/weather-maps.json');
                const data = await response.json();
                host = data.host;
                timestamps = data.radar.past.slice(-13); 
                const slider = document.getElementById('radar-slider');
                slider.max = timestamps.length - 1;
                slider.value = timestamps.length - 1;
                updateRadar(timestamps.length - 1);
                slider.addEventListener('input', (e) => updateRadar(parseInt(e.target.value)));
            } catch (e) { console.error(e); }
        }

        function updateRadar(index) {
            const frame = timestamps[index];
            if (!frame) return;
            radarLayer.setUrl(`${host}${frame.path}/512/{z}/{x}/{y}/4/1_0.png`);
            const date = new Date(frame.time * 1000);
            document.getElementById('time-label').innerText = 
                (index === timestamps.length - 1 ? "● ARA " : "PASSAT ") + date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function locateUser() { map.locate({setView: true, maxZoom: 10}); }
        map.on('locationfound', function(e) {
            if (userMarker) userMarker.setLatLng(e.latlng);
            else {
                const icon = L.divIcon({ 
                    className: 'user-location-dot', 
                    html: '<div style="width:10px; height:10px; background:#007AFF; border:2px solid white; border-radius:50%; box-shadow:0 0 8px #007AFF;"></div>',
                    iconSize: [14, 14], iconAnchor: [7, 7] 
                });
                userMarker = L.marker(e.latlng, {icon: icon}).addTo(map);
            }
        });

        initRadar();
    </script>
</body>
</html>
