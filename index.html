<!DOCTYPE html>
<html>
<head>
    <title>Radar Meteorológico Pro - RainViewer</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { 
            height: 100vh; /* Ocupa toda la pantalla */
            width: 100%; 
            background-color: #1a1a1a;
        }
        .info-panel {
            position: absolute;
            top: 10px;
            left: 50px;
            z-index: 1000;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px;
            border-radius: 8px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="info-panel">Radar en tiempo real (RainViewer)</div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // 1. Inicializar el mapa centrado en España
        const map = L.map('map').setView([40.4167, -3.7033], 6);

        // 2. Capa de mapa base (Estilo oscuro para que resalte la lluvia)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO'
        }).addTo(map);

        // 3. Capa de Radar de RainViewer
        // Explicación de la URL:
        // /nowcast_10/ -> Predicción inmediata basada en radares oficiales (AEMET incluído)
        // /256/{z}/{x}/{y}/ -> Tamaño de tesela y coordenadas del mapa
        // /2/1_1.png -> Estilo de color (el '2' es el esquema universal de radar)
        const radarLayer = L.tileLayer('https://tilecache.rainviewer.com/v2/radar/nowcast_10/256/{z}/{x}/{y}/2/1_1.png', {
            attribution: 'Radar data by RainViewer',
            opacity: 0.8,
            transparent: true,
            zIndex: 1000
        }).addTo(map);

        // 4. Función opcional para refrescar el radar cada 5 minutos
        setInterval(function() {
            radarLayer.redraw();
        }, 300000);
    </script>
</body>
</html>
